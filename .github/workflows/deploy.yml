name: Deploy — Supabase Migration + Vercel

# Trigger: setiap push ke branch main
on:
  push:
    branches:
      - main

jobs:
  # ─── JOB 1: Jalankan Supabase DB Migration ───────────────────
  supabase-migration:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Jalankan migrasi ke Supabase (db push)
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
        # SUPABASE_DB_URL format:
        # postgresql://postgres.[project-ref]:[password]@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres
        # Ambil dari: Supabase Dashboard → Settings → Database → Connection string → URI

  # ─── JOB 2: Build & Deploy ke Vercel ────────────────────────
  vercel-deploy:
    name: Deploy ke Vercel
    runs-on: ubuntu-latest
    needs: supabase-migration   # Tunggu migration sukses dulu

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build dengan Vercel (inject env vars)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy ke Vercel (Production — prebuilt)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
