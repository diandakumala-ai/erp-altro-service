name: Deploy — Supabase Migration + Vercel

# Trigger: setiap push ke branch main
on:
  push:
    branches:
      - main

jobs:
  # ─── JOB 1: Jalankan Supabase DB Migration ───────────────────
  supabase-migration:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Jalankan migrasi ke Supabase (db push)
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ─── JOB 2: Deploy ke Vercel ────────────────────────────────
  vercel-deploy:
    name: Deploy ke Vercel
    runs-on: ubuntu-latest
    needs: supabase-migration

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cek required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v belum di-set di GitHub repo settings."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Install Vercel CLI
        run: npm install --global vercel@39

      - name: Resolve Vercel ORG_ID untuk PROJECT_ID yang sudah fix
        id: discover
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # PROJECT_ID di-hardcode sesuai instruksi user — lebih reliable daripada cari-nama
          # (project Vercel pernah ganti nama: erp / erp-app / erp-altro-service).
          FINAL_PROJ_ID="prj_0k1EllNoJNBOYzzBdCSeKmcAEmaG"
          echo "Target PROJECT_ID: $FINAL_PROJ_ID"

          echo "== Token owner =="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/user" \
            | jq -r '"  username=" + .user.username + " | email=" + .user.email'
          echo

          # Cek di personal scope
          echo "== Cek project di personal scope =="
          status=$(curl -sS -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$FINAL_PROJ_ID")
          if [ "$status" = "200" ]; then
            FINAL_ORG_ID=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v2/user" | jq -r '.user.id')
            echo "✓ Project ditemukan di personal scope. ORG_ID (user)=$FINAL_ORG_ID"
          else
            echo "→ Tidak ada di personal scope (http $status). Cari di teams…"
            curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v2/teams" > /tmp/teams.json
            jq -r '.teams[]? | "  - \(.name) | id=\(.id) | slug=\(.slug)"' < /tmp/teams.json

            FINAL_ORG_ID=""
            for tid in $(jq -r '.teams[]? | .id' < /tmp/teams.json); do
              status=$(curl -sS -o /tmp/proj.json -w "%{http_code}" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v9/projects/$FINAL_PROJ_ID?teamId=$tid")
              if [ "$status" = "200" ]; then
                FINAL_ORG_ID=$tid
                echo "✓ Project ditemukan di team $tid"
                break
              fi
            done

            if [ -z "$FINAL_ORG_ID" ]; then
              echo "::error::PROJECT_ID $FINAL_PROJ_ID tidak ditemukan di personal scope maupun team manapun yang bisa diakses VERCEL_TOKEN. Cek (1) token punya scope ke owner project; (2) PROJECT_ID benar."
              exit 1
            fi
          fi

          echo "PROJECT_ID=$FINAL_PROJ_ID" >> "$GITHUB_OUTPUT"
          echo "ORG_ID=$FINAL_ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy ke Vercel (Production) — pakai ID yang ditemukan
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.discover.outputs.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.discover.outputs.PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Deploy dengan ORG_ID=$VERCEL_ORG_ID PROJECT_ID=$VERCEL_PROJECT_ID"
          vercel deploy \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            --build-env "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" \
            --build-env "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
