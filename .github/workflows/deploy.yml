name: Deploy — Supabase Migration + Vercel

# Trigger: setiap push ke branch main
on:
  push:
    branches:
      - main

jobs:
  # ─── JOB 1: Jalankan Supabase DB Migration ───────────────────
  supabase-migration:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validasi format SUPABASE_DB_URL
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Cek format tanpa expose value
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Secret SUPABASE_DB_URL belum di-set."
            exit 1
          fi

          if ! printf "%s" "$SUPABASE_DB_URL" | grep -qE '^postgres(ql)?://'; then
            echo "::error::SUPABASE_DB_URL harus diawali 'postgresql://' atau 'postgres://'. Format yang benar: postgresql://USER:PASSWORD@HOST:PORT/DATABASE"
            exit 1
          fi

          # Ekstrak port (tanpa expose password) — pakai sed
          PORT=$(printf "%s" "$SUPABASE_DB_URL" | sed -E 's|.*@[^:/]+:([0-9]+)/.*|\1|')
          echo "Detected port: $PORT"
          if [ "$PORT" = "6543" ]; then
            echo "::error::Port 6543 = Transaction Pooler. Tidak support prepared statements yang dipakai Supabase CLI 'db push'. Ganti ke port 5432 (Session Pooler) di GitHub Secret SUPABASE_DB_URL."
            exit 1
          fi

          # Reject direct connection — IPv6-only, GitHub Actions tidak punya IPv6 outbound
          HOST=$(printf "%s" "$SUPABASE_DB_URL" | sed -E 's|.*@([^:/]+).*|\1|')
          echo "Detected host: $HOST"
          if printf "%s" "$HOST" | grep -qE '^db\..*\.supabase\.co$'; then
            cat <<'EOF'
::error::Pakai direct connection (db.*.supabase.co) — IPv6-only, akan gagal "network is unreachable" dari GitHub Actions runner.

GANTI ke session pooler. Format yang benar:
  postgresql://postgres.PROJECT_REF:PASSWORD@aws-X-REGION.pooler.supabase.com:5432/postgres

Untuk project ini contohnya:
  postgresql://postgres.kcyfkjddgbjvjgdoojms:PASSWORD@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres

(Cara cepat: ambil URL transaction pooler dari Supabase Dashboard, ganti port 6543 → 5432.)
EOF
            exit 1
          fi

          if ! printf "%s" "$HOST" | grep -qE 'pooler\.supabase\.com$'; then
            echo "::warning::Host bukan pooler.supabase.com — pastikan host yang Anda pakai bisa di-reach via IPv4."
          fi

          echo "✓ Format SUPABASE_DB_URL lulus validasi"

      - name: Jalankan migrasi ke Supabase (db push)
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ─── JOB 2: Deploy ke Vercel ────────────────────────────────
  vercel-deploy:
    name: Deploy ke Vercel
    runs-on: ubuntu-latest
    needs: supabase-migration

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cek required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v belum di-set di GitHub repo settings."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Install Vercel CLI
        # Vercel API butuh CLI ≥ 47.2.2 (per error log 2026-05).
        # Pakai @latest supaya tidak ketinggalan lagi kalau ada bump endpoint berikutnya.
        run: npm install --global vercel@latest

      - name: Vercel API — diagnostik raw (token + project + teams)
        id: discover
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TARGET_PROJ_ID="prj_0k1EllNoJNBOYzzBdCSeKmcAEmaG"
          PROJECT_CANDIDATES="erp erp-app erp-altro-service"

          # Helper: panggil API, dump raw body + HTTP status, return body via stdout
          api() {
            local url=$1
            local label=$2
            local status
            status=$(curl -sS -o /tmp/api_body -w "%{http_code}" \
              -H "Authorization: Bearer $VERCEL_TOKEN" "$url")
            echo "─── $label" >&2
            echo "  URL:    $url" >&2
            echo "  HTTP:   $status" >&2
            echo "  Body:   $(head -c 500 /tmp/api_body)" >&2
            echo "" >&2
            cat /tmp/api_body
            return $([ "$status" = "200" ] && echo 0 || echo 1)
          }

          # ── Sanity check: token format ──
          TOK_LEN=$(printf "%s" "$VERCEL_TOKEN" | wc -c)
          # Hash pertama-4-char saja, supaya bisa cek "token yang dipakai sama dgn yang dimaksud" tanpa leak
          TOK_PREFIX=$(printf "%s" "$VERCEL_TOKEN" | head -c 4)
          echo "Token length: $TOK_LEN | prefix: $TOK_PREFIX..."
          echo

          # ── /v2/user (raw) ──
          USER_BODY=$(api "https://api.vercel.com/v2/user" "GET /v2/user")
          USER_ID=$(echo "$USER_BODY" | jq -r '.user.id // empty')
          USERNAME=$(echo "$USER_BODY" | jq -r '.user.username // empty')

          # ── /v2/teams (raw) ──
          TEAMS_BODY=$(api "https://api.vercel.com/v2/teams" "GET /v2/teams" || true)
          TEAM_IDS=$(echo "$TEAMS_BODY" | jq -r '.teams[]? | .id')

          # ── /v9/projects (personal, raw) ──
          PROJ_PERS=$(api "https://api.vercel.com/v9/projects?limit=100" "GET /v9/projects (personal)" || true)
          echo "Personal projects:"
          echo "$PROJ_PERS" | jq -r '.projects[]? | "  - \(.name) [\(.id)]"' || echo "  (parsing failed)"
          echo

          # ── /v9/projects per team (raw) ──
          for tid in $TEAM_IDS; do
            PROJ_TEAM=$(api "https://api.vercel.com/v9/projects?teamId=$tid&limit=100" "GET /v9/projects (team=$tid)" || true)
            echo "Projects in team $tid:"
            echo "$PROJ_TEAM" | jq -r '.projects[]? | "  - \(.name) [\(.id)]"' || echo "  (parsing failed)"
            # Cache untuk pencarian by ID/name
            echo "$PROJ_TEAM" > /tmp/projs_$tid.json
            echo
          done

          # ── Try GET target project directly (personal + per team) ──
          echo "─── Pencarian target project ───"
          FINAL_PROJ_ID=""
          FINAL_ORG_ID=""

          STATUS=$(curl -sS -o /tmp/target.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$TARGET_PROJ_ID")
          echo "  /v9/projects/$TARGET_PROJ_ID (personal) → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            FINAL_PROJ_ID=$TARGET_PROJ_ID
            FINAL_ORG_ID=$USER_ID
            echo "  ✓ Ketemu di personal scope"
          else
            for tid in $TEAM_IDS; do
              STATUS=$(curl -sS -o /tmp/target.json -w "%{http_code}" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v9/projects/$TARGET_PROJ_ID?teamId=$tid")
              echo "  /v9/projects/$TARGET_PROJ_ID?teamId=$tid → HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                FINAL_PROJ_ID=$TARGET_PROJ_ID
                FINAL_ORG_ID=$tid
                echo "  ✓ Ketemu di team $tid"
                break
              fi
            done
          fi

          # Fallback: cari by nama kandidat di response yang sudah di-dump
          if [ -z "$FINAL_PROJ_ID" ]; then
            echo "  Target ID tidak ketemu. Coba fallback by nama: $PROJECT_CANDIDATES"
            for cand in $PROJECT_CANDIDATES; do
              pid=$(echo "$PROJ_PERS" | jq -r --arg n "$cand" '.projects[]? | select(.name==$n) | .id' | head -1)
              if [ -n "$pid" ]; then
                FINAL_PROJ_ID=$pid; FINAL_ORG_ID=$USER_ID
                echo "  ✓ Fallback name '$cand' ketemu di personal: $pid"; break
              fi
            done
          fi
          if [ -z "$FINAL_PROJ_ID" ]; then
            for tid in $TEAM_IDS; do
              for cand in $PROJECT_CANDIDATES; do
                pid=$(jq -r --arg n "$cand" '.projects[]? | select(.name==$n) | .id' < /tmp/projs_$tid.json | head -1)
                if [ -n "$pid" ]; then
                  FINAL_PROJ_ID=$pid; FINAL_ORG_ID=$tid
                  echo "  ✓ Fallback name '$cand' ketemu di team $tid: $pid"; break 2
                fi
              done
            done
          fi

          if [ -z "$FINAL_PROJ_ID" ]; then
            echo "::error::Token tidak punya akses ke target project maupun nama kandidat. Lihat dump di atas — kalau /v2/user balikin empty/error berarti token invalid; kalau /v2/teams kosong berarti token scope hanya personal tanpa akses team."
            exit 1
          fi

          echo
          echo "→ FINAL: PROJECT_ID=$FINAL_PROJ_ID  ORG_ID=$FINAL_ORG_ID"
          echo "PROJECT_ID=$FINAL_PROJ_ID" >> "$GITHUB_OUTPUT"
          echo "ORG_ID=$FINAL_ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy ke Vercel (Production) — pakai ID yang ditemukan
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.discover.outputs.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.discover.outputs.PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Deploy dengan ORG_ID=$VERCEL_ORG_ID PROJECT_ID=$VERCEL_PROJECT_ID"
          vercel deploy \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            --build-env "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" \
            --build-env "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
