name: Deploy — Supabase Migration + Vercel

# Trigger: setiap push ke branch main
on:
  push:
    branches:
      - main

jobs:
  # ─── JOB 1: Jalankan Supabase DB Migration ───────────────────
  supabase-migration:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Jalankan migrasi ke Supabase (db push)
        run: |
          supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  # ─── JOB 2: Deploy ke Vercel ────────────────────────────────
  vercel-deploy:
    name: Deploy ke Vercel
    runs-on: ubuntu-latest
    needs: supabase-migration

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cek required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          missing=0
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret $v belum di-set di GitHub repo settings."
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Install Vercel CLI
        run: npm install --global vercel@39

      - name: Vercel API diagnostics (cek project bisa diakses)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "== Vercel CLI version =="
          vercel --version
          echo
          echo "== Token owner =="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/user" \
            | jq -r '"username=" + .user.username + " | email=" + .user.email'
          echo
          echo "== Cek project dengan teamId =="
          http_code=$(curl -sS -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")
          echo "HTTP $http_code"
          jq '{id, name, accountId, framework}' < /tmp/proj.json 2>/dev/null || cat /tmp/proj.json
          echo
          echo "== Cek project TANPA teamId (personal scope) =="
          http_code=$(curl -sS -o /tmp/proj2.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID")
          echo "HTTP $http_code"
          jq '{id, name, accountId, framework}' < /tmp/proj2.json 2>/dev/null || cat /tmp/proj2.json
          echo
          echo "== List projects (personal scope) =="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=20" \
            | jq -r '.projects[]? | "  - \(.name) | id=\(.id) | accountId=\(.accountId)"'
          echo
          echo "== List teams =="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/teams" \
            | jq -r '.teams[]? | "  - \(.name) | id=\(.id) | slug=\(.slug)"'

      - name: Deploy ke Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          vercel deploy \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            --build-env "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" \
            --build-env "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
